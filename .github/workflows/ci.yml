name: CI

# Run the test suites on every push to main and every PR, so regressions are
# caught before a release tag is cut.
on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: gobridge/go.mod
          cache-dependency-path: gobridge/go.sum

      - name: Go tests
        working-directory: gobridge
        run: go test ./...

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Kotlin unit tests
        run: ./gradlew testReleaseUnitTest
